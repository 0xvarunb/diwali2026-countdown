<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Diwali 2026 Countdown</title>
  <style>
    :root {
      --bg-1: #1a0b2e;
      --bg-2: #3d1a4a;
      --accent: #ffb347;
      --accent-strong: #ffd86b;
      --text: #fff5e1;
      --muted: #d8b6c9;
      --tile-bg: rgba(255, 255, 255, 0.06);
      --tile-border: rgba(255, 179, 71, 0.25);
    }

    [data-theme="rangoli"] {
      --bg-1: #fff5e6;
      --bg-2: #ffd9a8;
      --accent: #c2185b;
      --accent-strong: #d81b60;
      --text: #4a0e3a;
      --muted: #8a3a6e;
      --tile-bg: rgba(194, 24, 91, 0.08);
      --tile-border: rgba(194, 24, 91, 0.3);
    }

    [data-theme="peacock"] {
      --bg-1: #062e3f;
      --bg-2: #0d4a5c;
      --accent: #d4af37;
      --accent-strong: #ffd700;
      --text: #e8f4f8;
      --muted: #7bb8c9;
      --tile-bg: rgba(212, 175, 55, 0.08);
      --tile-border: rgba(212, 175, 55, 0.3);
    }

    [data-theme="marigold"] {
      --bg-1: #1f3a1f;
      --bg-2: #2d5a2d;
      --accent: #ff8c00;
      --accent-strong: #ffd700;
      --text: #fff8dc;
      --muted: #c9b896;
      --tile-bg: rgba(255, 140, 0, 0.1);
      --tile-border: rgba(255, 140, 0, 0.35);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 50% 0%, var(--bg-2) 0%, var(--bg-1) 70%);
    }

    main {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.02em;
      background: linear-gradient(180deg, var(--accent-strong), var(--accent));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .subtitle {
      margin: 0.5rem 0 3rem;
      font-size: 1.1rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    .countdown {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .unit {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 6rem;
      padding: 1.25rem 1rem;
      background: var(--tile-bg);
      border: 1px solid var(--tile-border);
      border-radius: 12px;
      backdrop-filter: blur(8px);
    }

    .value {
      font-size: clamp(2rem, 6vw, 3.5rem);
      font-weight: 700;
      color: var(--accent-strong);
      font-variant-numeric: tabular-nums;
    }

    .label {
      margin-top: 0.25rem;
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
    }

    .message {
      margin-top: 3rem;
      font-size: 1.25rem;
      color: var(--accent-strong);
      min-height: 1.5em;
    }

    .theme-picker {
      position: fixed;
      bottom: 1rem;
      right: 1rem;
      display: flex;
      gap: 0.5rem;
      padding: 0.4rem 0.55rem;
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 999px;
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .theme-picker button {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .theme-picker button:hover {
      transform: scale(1.12);
    }

    .theme-picker button:focus-visible {
      outline: 2px solid var(--accent-strong);
      outline-offset: 2px;
    }

    .theme-picker button[aria-pressed="true"] {
      border-color: rgba(255, 255, 255, 0.9);
    }

    .theme-picker button[data-theme-swatch="diya"] {
      background: linear-gradient(135deg, #3d1a4a 0%, #ffb347 100%);
    }

    .theme-picker button[data-theme-swatch="rangoli"] {
      background: linear-gradient(135deg, #fff5e6 0%, #c2185b 100%);
    }

    .theme-picker button[data-theme-swatch="peacock"] {
      background: linear-gradient(135deg, #0d4a5c 0%, #d4af37 100%);
    }

    .theme-picker button[data-theme-swatch="marigold"] {
      background: linear-gradient(135deg, #2d5a2d 0%, #ff8c00 100%);
    }
  </style>
</head>
<body>
  <main>
    <h1>Diwali 2026</h1>
    <p class="subtitle">November 8, 2026</p>
    <div class="countdown" aria-live="polite">
      <div class="unit"><span class="value" id="days">--</span><span class="label">Days</span></div>
      <div class="unit"><span class="value" id="hours">--</span><span class="label">Hours</span></div>
      <div class="unit"><span class="value" id="minutes">--</span><span class="label">Minutes</span></div>
      <div class="unit"><span class="value" id="seconds">--</span><span class="label">Seconds</span></div>
    </div>
    <p class="message" id="message"></p>
  </main>

  <div class="theme-picker" role="group" aria-label="Festive theme">
    <button type="button" data-theme-swatch="diya" aria-label="Diya theme" title="Diya"></button>
    <button type="button" data-theme-swatch="rangoli" aria-label="Rangoli theme" title="Rangoli"></button>
    <button type="button" data-theme-swatch="peacock" aria-label="Peacock theme" title="Peacock"></button>
    <button type="button" data-theme-swatch="marigold" aria-label="Marigold theme" title="Marigold"></button>
  </div>

  <script>
    const target = new Date("2026-11-08T00:00:00").getTime();
    const els = {
      days: document.getElementById("days"),
      hours: document.getElementById("hours"),
      minutes: document.getElementById("minutes"),
      seconds: document.getElementById("seconds"),
      message: document.getElementById("message"),
    };

    function pad(n) { return String(n).padStart(2, "0"); }

    function tick() {
      const diff = target - Date.now();
      if (diff <= 0) {
        els.days.textContent = "00";
        els.hours.textContent = "00";
        els.minutes.textContent = "00";
        els.seconds.textContent = "00";
        els.message.textContent = "Happy Diwali!";
        return false;
      }
      const s = Math.floor(diff / 1000);
      els.days.textContent = pad(Math.floor(s / 86400));
      els.hours.textContent = pad(Math.floor((s % 86400) / 3600));
      els.minutes.textContent = pad(Math.floor((s % 3600) / 60));
      els.seconds.textContent = pad(s % 60);
      return true;
    }

    if (tick()) setInterval(tick, 1000);

    const THEME_KEY = "diwali-theme";
    const themeButtons = document.querySelectorAll(".theme-picker button");

    function applyTheme(name) {
      document.documentElement.setAttribute("data-theme", name);
      themeButtons.forEach(b => {
        b.setAttribute("aria-pressed", String(b.dataset.themeSwatch === name));
      });
      try { localStorage.setItem(THEME_KEY, name); } catch (_) {}
    }

    themeButtons.forEach(b => {
      b.addEventListener("click", () => applyTheme(b.dataset.themeSwatch));
    });

    let saved = null;
    try { saved = localStorage.getItem(THEME_KEY); } catch (_) {}
    applyTheme(saved || "diya");
  </script>
</body>
</html>
